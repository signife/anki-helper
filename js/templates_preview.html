<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Anki templates.js 미리보기</title><style>
:root {
  --card-bg: #121212;
  --top-bg: #171717;
  --panel-bg: #2b2b2b;
  --panel-line: rgba(255, 255, 255, 0.12);
  --text-main: #f5f5f5;
  --text-muted: #c7c7c7;
  --text-dim: #9d9d9d;
  --popup-bg: rgba(24, 24, 24, 0.88);
  --popup-border: rgba(255, 255, 255, 0.2);
}

* {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  min-height: 100%;
  margin: 0;
  padding: 0;
  background: var(--card-bg);
}

.card {
  margin: 0;
  padding: 0;
  background: var(--card-bg);
  color: var(--text-main);
  font-family: "Yu Mincho", "Noto Serif JP", "MS Mincho", serif;
  text-align: left;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

.card-shell {
  position: relative;
  width: 100%;
  min-height: 100vh;
  overflow: hidden;
  background: var(--card-bg);
  color: var(--text-main);
}

.front-stage {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
  padding: 32px 22px;
  background: var(--top-bg);
}

.answer-top {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: 18px;
  padding: 42px 24px 30px;
  background: var(--top-bg);
}

.word-block {
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  line-height: 1.15;
}

.card-front .word-ruby,
.card-back .word-ruby {
  display: inline-ruby;
  margin: 0;
  color: var(--text-main);
  font-family: "Yu Mincho", "Noto Serif JP", "MS Mincho", serif;
  font-size: 56px;
  font-weight: 600;
  line-height: 1.2;
  letter-spacing: 0.02em;
  white-space: normal;
  overflow-wrap: anywhere;
}

.word-ruby rt {
  color: var(--text-muted);
  font-family: "Yu Mincho", "Noto Serif JP", "MS Mincho", serif;
  font-size: 0.38em;
  font-weight: 500;
  line-height: 1.15;
  letter-spacing: 0.04em;
  text-align: center;
}

.word-character {
  display: inline;
  font: inherit;
  line-height: inherit;
  letter-spacing: inherit;
  color: inherit;
}

.kanji-character {
  appearance: none;
  -webkit-appearance: none;
  margin: 0;
  padding: 0;
  border: 0;
  border-radius: 0;
  background: transparent;
  cursor: pointer;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}

.kanji-character:active,
.kanji-character:focus-visible {
  opacity: 0.7;
  outline: none;
}

.audio-row {
  width: 100%;
  min-height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.audio-row:empty {
  display: none;
}

.replay-button,
.replaybutton,
.soundLink,
a.replay-button {
  display: inline-flex !important;
  align-items: center;
  justify-content: center;
  margin: 0 auto !important;
  color: var(--text-main) !important;
  filter: grayscale(1) brightness(1.3);
  opacity: 0.9;
}

.replay-button svg,
.replaybutton svg,
.soundLink svg {
  width: 30px !important;
  height: 30px !important;
}

.meaning-divider {
  width: min(680px, 86vw);
  height: 1px;
  margin-top: 2px;
  background: rgba(255, 255, 255, 0.22);
}

.meaning-area {
  width: min(820px, 92vw);
  min-height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.meaning-text {
  width: 100%;
  color: #ffffff;
  font-family: "Yu Mincho", "Noto Serif JP", "MS Mincho", serif;
  font-size: clamp(25px, 3.5vw, 38px);
  font-weight: 600;
  line-height: 1.55;
  text-align: center;
  white-space: normal;
  overflow-wrap: anywhere;
}

.meaning-text[hidden] {
  display: none !important;
}

.detail-panel {
  width: 100%;
  max-height: 48vh;
  overflow-x: hidden;
  overflow-y: auto;
  padding: 8px 20px 28px;
  background: var(--panel-bg);
  color: var(--text-muted);
  border-top: 1px solid var(--panel-line);
  scrollbar-width: thin;
  scrollbar-color: #777 transparent;
}

.detail-panel:empty {
  display: none;
}

.detail-panel::-webkit-scrollbar {
  width: 7px;
}

.detail-panel::-webkit-scrollbar-thumb {
  background: #707070;
  border-radius: 999px;
}

.detail-section {
  width: min(900px, 100%);
  margin: 0 auto;
  padding: 22px 4px;
  border-bottom: 1px solid var(--panel-line);
}

.detail-section:last-child {
  border-bottom: 0;
}

.detail-content {
  color: var(--text-muted);
  font-family: "Yu Mincho", "Noto Serif JP", "MS Mincho", serif;
  font-size: 20px;
  font-weight: 400;
  line-height: 1.75;
  text-align: left;
  white-space: normal;
  overflow-wrap: anywhere;
}

.detail-content br + br {
  line-height: 2.15;
}

.examples-audio {
  margin-top: 14px;
}

.kanji-popup {
  position: absolute;
  z-index: 1000;
  width: min(330px, calc(100vw - 20px));
  max-height: 42vh;
  overflow-y: auto;
  padding: 15px 16px;
  border: 1px solid var(--popup-border);
  border-radius: 12px;
  background: var(--popup-bg);
  color: var(--text-main);
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.38);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.kanji-popup[hidden] {
  display: none !important;
}

.kanji-popup-title {
  display: block;
  margin: 0 0 10px;
  color: #ffffff;
  font-family: "Yu Mincho", "Noto Serif JP", "MS Mincho", serif;
  font-size: 32px;
  font-weight: 700;
  line-height: 1;
  text-align: center;
}

.kanji-popup-content {
  color: var(--text-muted);
  font-size: 14px;
  line-height: 1.55;
}

.kanji-popup-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 5px 0;
  border-top: 1px solid rgba(255, 255, 255, 0.08);
}

.kanji-popup-row:first-child {
  border-top: 0;
}

.kanji-popup-label {
  flex: 0 0 auto;
  min-width: 42px;
  color: var(--text-dim);
  font-weight: 600;
}

.kanji-popup-value {
  flex: 1 1 auto;
  min-width: 0;
  color: var(--text-main);
  overflow-wrap: anywhere;
}

.template-source {
  display: none !important;
}

.nightMode .card,
.night_mode .card,
.mobile .card {
  background: var(--card-bg);
  color: var(--text-main);
}

@media (max-width: 640px) {
  .front-stage {
    gap: 18px;
    padding: 24px 16px;
  }

  .answer-top {
    gap: 15px;
    padding: 34px 16px 24px;
  }

  .card-front .word-ruby,
  .card-back .word-ruby {
    font-size: 44px;
  }

  .meaning-text {
    font-size: 25px;
    line-height: 1.5;
  }

  .detail-panel {
    max-height: 50vh;
    padding: 6px 16px 24px;
  }

  .detail-section {
    padding: 18px 2px;
  }

  .detail-content {
    font-size: 18px;
    line-height: 1.7;
  }

  .kanji-popup {
    padding: 13px 14px;
  }
}

@media (max-height: 680px) {
  .answer-top {
    padding-top: 25px;
    padding-bottom: 20px;
  }

  .detail-panel {
    max-height: 44vh;
  }
}


:root{color-scheme:dark}body.preview-page{min-height:100vh;height:auto;overflow:auto;background:#101010;color:#eee;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.preview-toolbar{position:sticky;top:0;z-index:10000;display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:12px;background:rgba(16,16,16,.96);border-bottom:1px solid #333}.preview-toolbar button{padding:8px 13px;border:1px solid #666;border-radius:7px;color:#eee;background:#2b2b2b;cursor:pointer}.preview-toolbar button.active{background:#555}.preview-toolbar .note{margin-left:auto;color:#aaa;font-size:13px}.preview-stage{display:grid;place-items:center;padding:24px}.device{width:min(390px,calc(100vw - 32px));height:min(844px,calc(100vh - 110px));min-height:600px;border:1px solid #444;border-radius:18px;overflow:hidden;box-shadow:0 18px 60px rgba(0,0,0,.45);background:#121212}.device .card{width:100%;height:100%}.preview-side-by-side{grid-template-columns:repeat(2,minmax(320px,390px));align-items:start;gap:22px}.preview-side-by-side .device{width:100%;height:760px}.preview-label{margin-bottom:8px;text-align:center;font-weight:700}.panel{display:none}.panel.active{display:block}.preview-side-by-side .panel{display:block}.mock-audio{display:inline-grid;place-items:center;width:44px;height:44px;border:0;border-radius:50%;color:#222;background:#e8e8e8;font-size:21px}@media(max-width:830px){.preview-side-by-side{grid-template-columns:1fr}.preview-side-by-side .device{width:min(390px,calc(100vw - 32px));height:760px}.preview-toolbar .note{width:100%;margin-left:0}}
</style></head><body class="preview-page"><div class="preview-toolbar"><button id="frontBtn" class="active">앞면</button><button id="backBtn">뒷면</button><button id="bothBtn">나란히 보기</button><span class="note">샘플: 正義（せいぎ） · 한자를 누르면 팝업 표시</span></div><div id="stage" class="preview-stage"><section id="frontPanel" class="panel active"><div class="preview-label">FRONT</div><div class="device"><div class="card"><div class="card-shell card-front"><main class="front-stage"><div class="word-block"><ruby class="word-ruby"><rb>正義</rb><rt>せいぎ</rt></ruby></div><div class="audio-row word-audio"><button class="mock-audio" type="button">▶</button></div></main></div></div></div></section><section id="backPanel" class="panel"><div class="preview-label">BACK</div><div class="device"><div class="card"><div id="jlptCard" class="card-shell card-back" data-card-mode="jp-native"><section class="answer-top"><div class="word-block"><ruby class="word-ruby"><rb id="backWordCharacters"><span class="word-character"><button class="word-character kanji-character" data-kanji="正" type="button">正</button></span><span class="word-character"><button class="word-character kanji-character" data-kanji="義" type="button">義</button></span></rb><rt>せいぎ</rt></ruby></div><div class="audio-row word-audio"><button class="mock-audio" type="button">▶</button></div><div class="meaning-divider"></div><div class="meaning-area"><div class="meaning-text meaning-native">정의, 올바른 도리</div></div></section><section class="detail-panel"><article class="detail-section examples-section"><div class="detail-content"><ul><li><ruby>彼<rt>かれ</rt></ruby>は<ruby>最後<rt>さいご</rt></ruby>まで<ruby>正義<rt>せいぎ</rt></ruby>を<ruby>貫<rt>つらぬ</rt></ruby>いた。<br>그는 마지막까지 정의를 관철했다.</li><li><ruby>正義<rt>せいぎ</rt></ruby>のために<ruby>声<rt>こえ</rt></ruby>を<ruby>上<rt>あ</rt></ruby>げる。<br>정의를 위해 목소리를 높이다.</li></ul></div><div class="audio-row examples-audio"><button class="mock-audio" type="button">▶</button></div></article><article class="detail-section expressions-section"><div class="detail-content"><ul><li>正義を貫く</li><li>正義感が強い</li></ul></div></article><article class="detail-section synonyms-section"><div class="detail-content"><ul><li>公正（こうせい）</li><li>正当（せいとう）</li></ul></div></article></section><div id="kanjiPopup" class="kanji-popup" hidden><strong id="kanjiPopupTitle" class="kanji-popup-title"></strong><div id="kanjiPopupContent" class="kanji-popup-content"></div></div></div></div></div></section></div><script>
(()=>{const stage=document.getElementById('stage'),fp=document.getElementById('frontPanel'),bp=document.getElementById('backPanel');const bs={front:document.getElementById('frontBtn'),back:document.getElementById('backBtn'),both:document.getElementById('bothBtn')};function mode(m){Object.values(bs).forEach(b=>b.classList.remove('active'));bs[m].classList.add('active');stage.classList.toggle('preview-side-by-side',m==='both');fp.classList.toggle('active',m==='front'||m==='both');bp.classList.toggle('active',m==='back'||m==='both')}bs.front.onclick=()=>mode('front');bs.back.onclick=()=>mode('back');bs.both.onclick=()=>mode('both');const popup=document.getElementById('kanjiPopup'),title=document.getElementById('kanjiPopupTitle'),content=document.getElementById('kanjiPopupContent');const info={正:'음독: セイ、ショウ\n훈독: ただしい、ただす\n의미: 바르다, 바로잡다',義:'음독: ギ\n의미: 옳음, 도리, 의리'};function hide(){popup.hidden=true}document.querySelectorAll('.kanji-character').forEach(btn=>btn.onclick=e=>{e.stopPropagation();title.textContent=btn.dataset.kanji;content.textContent=info[btn.dataset.kanji];popup.hidden=false;const r=btn.getBoundingClientRect();popup.style.left=Math.max(10,Math.min(r.left+r.width/2-165,innerWidth-340))+'px';popup.style.top=(r.bottom+10)+'px'});document.addEventListener('click',hide);popup.addEventListener('click',e=>e.stopPropagation())})();
</script></body></html>
